#server.port=8091
server.port=${PORT:0}
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.datasource.url=jdbc:postgresql://localhost:5432/gestor
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver
#spring.datasource.hikari.maximum-pool-size=5
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL95Dialect


#hikari config
spring.datasource.hikari.data-source-properties.stringtype=unspecified
#maximum number of milliseconds that a client will wait for a connection
spring.datasource.hikari.connection-timeout =300000
#minimum number of idle connections maintained by HikariCP in a connection pool
spring.datasource.hikari.minimum-idle=0
#maximum pool size
spring.datasource.hikari.maximum-pool-size=5
#maximum idle time for connection
spring.datasource.hikari.idle-timeout=240000
# maximum lifetime in milliseconds of a connection in the pool after it is closed.
spring.datasource.hikari.max-lifetime=240000
#default auto-commit behavior.
spring.datasource.hikari.auto-commit =true 

spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=debug
logging.file.name= ./log/gestor.log

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
logging.level.org.hibernate.type.descriptor.sql=TRACE

zuul.routes.security.sensitive-headers=Cookie,Set-Cookie

hystrix.command.default.execution.isolation.thread.timeoutInMilliseconds: 1500000
ribbon.ConnectTimeout: 3000
ribbon.ReadTimeout: 10000